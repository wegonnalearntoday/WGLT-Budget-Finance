
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>WGLT Test Console (GitHub Ready)</title>
</head>
<body style="margin:0;font-family:sans-serif;background:#111;color:#fff;">
<div style="padding:10px;background:#222;">
  <button onclick="loadApp()">Load App</button>
  <button onclick="run('btnRandomEvent')">Run Random Event</button>
  <button onclick="run('btnJobEvent')">Job Event</button>
  <button onclick="run('btnGenLocalTax')">Local Tax</button>
  <button onclick="run('btnInheritance')">Inheritance</button>
</div>

<iframe id="frame" style="width:100%;height:90vh;border:none;"></iframe>

<script>
function loadApp(){
  document.getElementById("frame").src = "../index.html";
}

function run(id){
  const f = document.getElementById("frame");
  try{
    const btn = f.contentWindow.document.getElementById(id);
    if(btn) btn.click();
    else alert("Button not found: "+id);
  }catch(e){
    alert("Load app first");
  }
}
</script>
</body>
</html>
